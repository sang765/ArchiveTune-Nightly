name: 🐛 Report Broken Version
description: Report an issue with a specific nightly version
labels: [bug, broken-version]
body:
  - type: checkboxes
    id: pre-submission-checklist
    attributes:
      label: Pre-Submission Checklist
      description: Before reporting a broken version, please ensure:
      options:
        - label: I have confirmed this issue exists in the latest nightly build.
          required: true
        - label: This issue is specifically about a broken/crashing version, not a general bug.
          required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The broken nightly version (e.g., N20260305)
      placeholder: e.g., N20260305
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: Describe what went wrong with this version.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we make this issue happen?
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: 

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Recordings
      description: Add screenshots or recordings if applicable

  - type: input
    id: os
    attributes:
      label: OS
      description: Your operating system
      placeholder: e.g., Android 14

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else we should know?
      placeholder: 
