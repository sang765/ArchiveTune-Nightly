name: Update Release Notes

on:
  repository_dispatch:
    types: [update-release-notes]
  workflow_dispatch:
    inputs:
      new_version:
        description: 'Release version to update'
        required: true
        default: 'nightly-latest'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
    steps:
      - name: 🔎 Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          persist-credentials: true

      # Setup Java for Kotlin changelog generation
      - name: ☕ Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      # Setup Kotlin for Kotlin changelog generation
      - name: 🐘 Setup Kotlin
        uses: fwilhe2/setup-kotlin@v1.8

      - name: 🐘 Generate changelog
        run: kotlin scripts/generate-changelog.main.kts

      - name: 🗓️ Get Date
        id: date
        run: echo "date=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: ⏳ Get Time
        id: time
        run: echo "time=$(date +'%I:%M:%S %p')" >> $GITHUB_OUTPUT

      - name: 📃 Read changelog
        id: changelog
        run: |
          CHANGELOG=$(cat changelog.md)
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 🤖 AI Summarize
        id: ai_summary
        if: env.GEMINI_API_KEY != ''
        run: |
          # Escape changelog for JSON
          ESCAPED_CHANGELOG=$(jq -Rs . < changelog.md)
          
          # Prepare prompt
          PROMPT="Summarize the following commit messages into a clean, professional, and categorized release note. 
          Use categories like ✨ Features, 🐞 Bug Fixes, 🚀 Improvements, and 🧹 Refactor. 
          Keep it concise and highlight the most important changes.
          
          Commits:
          $ESCAPED_CHANGELOG"
          
          # Call Gemini API with retry logic
          MAX_RETRIES=3
          RETRY_COUNT=0
          WAIT_TIME=15
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
              -H 'Content-Type: application/json' \
              -d "{
                \"contents\": [{
                  \"parts\":[{\"text\": $(echo "$PROMPT" | jq -Rs .)}]
                }]
              }")
            
            # Check for error in response
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            
            if [ -z "$ERROR" ]; then
              break
            fi
            
            if echo "$RESPONSE" | jq -e '.error.code == 429' > /dev/null; then
              echo "Rate limit exceeded (429). Retrying in ${WAIT_TIME}s... (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
              sleep $WAIT_TIME
              RETRY_COUNT=$((RETRY_COUNT + 1))
              WAIT_TIME=$((WAIT_TIME * 2))
            else
              echo "API Error: $ERROR"
              break
            fi
          done
          
          # Extract text from response
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$AI_TEXT" ] || [ "$AI_TEXT" = "null" ]; then
            echo "AI summarization failed or returned empty. Response: $RESPONSE"
            echo "summary=" >> $GITHUB_OUTPUT
          else
            {
              echo "summary<<EOF"
              echo "## 🤖 AI Summary"
              echo "$AI_TEXT"
              echo ""
              echo "---"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🔄 Update release notes
        env:
          SUMMARY: ${{ steps.ai_summary.outputs.summary }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          if [ -n "$SUMMARY" ]; then
            echo "$SUMMARY" > release_body.md
            echo "" >> release_body.md
          fi
          echo "$CHANGELOG" >> release_body.md
          echo "" >> release_body.md
          echo "> [!NOTE]" >> release_body.md
          echo "> If this version broken something, you can create this [issue](https://github.com/${{ github.repository }}/issues/new?template=report-version-broken.yml). Thanks you." >> release_body.md
          
          gh release edit ${{ github.event.client_payload.new_version || github.event.inputs.new_version || 'nightly-latest' }} --notes-file release_body.md

      - name: 🔄 Update history
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/koiverse/ArchiveTune/commits/dev)
          LATEST_SHA=$(echo $RESPONSE | jq -r '.sha')
          MESSAGE=$(echo $RESPONSE | jq -r '.commit.message')
          
          mkdir -p history
          
          if [ -f history/commit.json ]; then
             jq --arg sha "$LATEST_SHA" --arg msg "$MESSAGE" '.commit.sha = $sha | .commit.message = $msg' history/commit.json > tmp.json && mv tmp.json history/commit.json
          else
             echo "{\"commit\": {\"sha\": \"$LATEST_SHA\", \"message\": \"$MESSAGE\", \"repository\": \"koiverse/ArchiveTune\", \"branch\": \"dev\"}}" > history/commit.json
          fi

      - name: 📤 Commit and push
        run: |
          git config --global user.name '${{ github.actor }}'
          git config --global user.email '${{ github.actor }}@users.noreply.github.com'
          
          # Check if there are changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add history/commit.json
          git commit -m "chore: update history pointer [skip ci]"
          
          # Pull latest changes to avoid conflicts
          git pull --rebase origin ${{ github.ref_name }} || git pull --rebase origin main
          
          # Push changes
          git push origin HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}