name: Update Release Notes

on:
  repository_dispatch:
    types: [update-release-notes]
  workflow_dispatch:
    inputs:
      new_version:
        description: 'Release version to update'
        required: true
        default: 'nightly-latest'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
    steps:
      - name: 🔎 Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          persist-credentials: true

      # Setup Java for Kotlin changelog generation
      - name: ☕ Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      # Setup Kotlin for Kotlin changelog generation
      - name: 🐘 Setup Kotlin
        uses: fwilhe2/setup-kotlin@v1.8

      - name: 🐘 Generate changelog
        run: kotlin .github/scripts/generate-changelog.main.kts
        env:
          REPO_PATH: "koiverse/ArchiveTune"
          BRANCH: "dev"

      - name: 🗓️ Get Date
        id: date
        run: echo "date=$(date -u +'%Y/%m/%d - %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📃 Read changelog
        id: changelog
        run: |
          CHANGELOG=$(cat changelog.md)
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 🤖 Summarize release
        id: ai_summary
        if: env.GEMINI_API_KEY != ''
        run: |
          # Escape changelog for JSON
          ESCAPED_CHANGELOG=$(jq -Rs . < changelog.md)
          
          # Prepare prompt
          PROMPT="Summarize the following commit messages into a clean, professional, and categorized release note. 
          Use categories like ✨ Features, 🐞 Bug Fixes, 🚀 Improvements, and 🧹 Refactor. 
          Keep it concise and highlight the most important changes.
          
          Additionally, look at the '## 🏆 MVP Committer' section in the provided text. 
          Pick the most impactful commit from that specific user and write a short 'MVP Highlight' (1-2 sentences) explaining why it was their best contribution.
          
          Format the output as:
          ## What changed on this release?
          [Your categorized summary here]
          
          ## 🌟 MVP Highlight
          [Your highlight for the MVP committer here]
          
          Commits:
          $ESCAPED_CHANGELOG"
          
          # Call Gemini API with retry logic
          MAX_RETRIES=3
          RETRY_COUNT=0
          WAIT_TIME=15
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=$GEMINI_API_KEY" \
              -H 'Content-Type: application/json' \
              -d "{
                \"contents\": [{
                  \"parts\":[{\"text\": $(echo "$PROMPT" | jq -Rs .)}]
                }]
              }")
            
            # Check for error in response
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            
            if [ -z "$ERROR" ]; then
              break
            fi
            
            if echo "$RESPONSE" | jq -e '.error.code == 429' > /dev/null; then
              echo "Rate limit exceeded (429). Retrying in ${WAIT_TIME}s... (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
              sleep $WAIT_TIME
              RETRY_COUNT=$((RETRY_COUNT + 1))
              WAIT_TIME=$((WAIT_TIME * 2))
            else
              echo "API Error: $ERROR"
              break
            fi
          done
          
          # Extract text from response
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$AI_TEXT" ] || [ "$AI_TEXT" = "null" ]; then
            echo "AI summarization failed or returned empty. Response: $RESPONSE"
            echo "summary=" >> $GITHUB_OUTPUT
          else
            {
              echo "summary<<EOF"
              echo "$AI_TEXT"
              echo ""
              echo "---"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🔄 Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          VERSION="${{ github.event.client_payload.new_version || github.event.inputs.new_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(gh release view latest --repo ${{ github.repository }} --json tagName --jq .tagName 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              echo "No releases found" && exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: 🔄 Update release notes
        env:
          SUMMARY: ${{ steps.ai_summary.outputs.summary }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          DATE: ${{ steps.date.outputs.date }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Release **ArchiveTune Nightly** artifact, generated on **$DATE (UTC +0)**" > release_body.md
          echo "" >> release_body.md
          echo "[![Download count](https://img.shields.io/github/downloads/${{ github.repository }}/$VERSION/total?style=flat-square&logo=Github&logoSize=20&label=DOWNLOAD%20COUNT%20FOR%20$VERSION&labelColor=001111&color=009900)](https://github.com/${{ github.repository }}/releases/$VERSION)" >> release_body.md
          echo "" >> release_body.md
          if [ -n "$SUMMARY" ]; then
            echo "$SUMMARY" >> release_body.md
            echo "" >> release_body.md
          fi
          echo "$CHANGELOG" >> release_body.md
          echo "" >> release_body.md
          echo "> [!NOTE]" >> release_body.md
          echo "> If this version broken something, you can create this [issue](https://github.com/${{ github.repository }}/issues/new?template=report-version-broken.yml). Thanks you." >> release_body.md
          
          gh release edit "$VERSION" --notes-file release_body.md
