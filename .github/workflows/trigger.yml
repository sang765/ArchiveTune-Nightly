name: Trigger Workflows

on:
  workflow_dispatch: 
  # Using https://console.cron-job.org for schedule
  # Github action delay schedule so much, that why i setup cron job for PERFECT without delay.
  # If you appect waiting more than 1 hour so... just use Github schedule.

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔄 Check for update
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'check-for-update',
              client_payload: {}
            })
