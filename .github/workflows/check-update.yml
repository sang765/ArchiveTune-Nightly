name: Check for Updates

on:
  workflow_run:
    workflows: ["Trigger Workflows"]
    types:
      - completed
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔎 Checkout
        uses: actions/checkout@v4

      - name: 🔎 Check for new commits in the last 24h
        id: check_commits
        run: |
          # Calculate since date (Yesterday 00:00 UTC)
          SINCE=$(date -u -d "yesterday 00:00" +"%Y-%m-%dT%H:%M:%SZ")
          # Calculate until date (Today 00:00 UTC)
          UNTIL=$(date -u -d "00:00" +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Checking commits from $SINCE to $UNTIL"
          
          RESPONSE=$(curl -s "https://api.github.com/repos/koiverse/ArchiveTune/commits?sha=dev&since=$SINCE&until=$UNTIL")
          COUNT=$(echo "$RESPONSE" | jq '. | length')
          
          echo "Found $COUNT commits."
          
          if [ "$COUNT" -gt 0 ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
          else
            echo "SKIP=true" >> $GITHUB_OUTPUT
          fi

      - name: 📞 Trigger nightly build
        if: steps.check_commits.outputs.SKIP == 'false' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "trigger-nightly", "client_payload": {"message": "Daily update from upstream"}}'
