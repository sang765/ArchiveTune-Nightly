name: Check for Updates

on:
  workflow_run:
    workflows: ["Trigger Workflows"]
    types:
      - completed
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔎 Checkout
        uses: actions/checkout@v6

      - name: 🔎 Get last build commit SHA from latest release
        id: last_release
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")

          BODY=$(echo "$RESPONSE" | jq -r '.body // ""')

          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "No previous release found. First time build."
            echo "SINCE_SHA=" >> $GITHUB_OUTPUT
          else
            SHA=$(echo "$BODY" | awk '/^## ✨ Changelog$/ {found=1; next} found && /commit\// {match($0, /commit\/([a-f0-9]+)/, a); print a[1]; exit}')
            echo "SINCE_SHA=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: 🔎 Check for new commits since last release
        id: check_commits
        run: |
          SINCE_SHA="${{ steps.last_release.outputs.SINCE_SHA }}"

          if [ -z "$SINCE_SHA" ]; then
            echo "No commit SHA from previous release. Triggering build."
            echo "SKIP=false" >> $GITHUB_OUTPUT
          else
            echo "Checking commits since $SINCE_SHA"
            RESPONSE=$(curl -s "https://api.github.com/repos/ArchiveTuneApp/ArchiveTune/compare/$SINCE_SHA...dev")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
            AHEAD_BY=$(echo "$RESPONSE" | jq -r '.ahead_by // 0')

            echo "Compare status: $STATUS, ahead_by: $AHEAD_BY"

            if [ "$STATUS" = "error" ] || [ "$AHEAD_BY" = "null" ]; then
              echo "Compare API failed. Falling back to 24h check."
              SINCE=$(date -u -d "yesterday 00:00" +"%Y-%m-%dT%H:%M:%SZ")
              UNTIL=$(date -u -d "00:00" +"%Y-%m-%dT%H:%M:%SZ")
              RESPONSE=$(curl -s "https://api.github.com/repos/ArchiveTuneApp/ArchiveTune/commits?sha=dev&since=$SINCE&until=$UNTIL")
              COUNT=$(echo "$RESPONSE" | jq '. | length')
              echo "Found $COUNT commits in last 24h."
              if [ "$COUNT" -gt 0 ]; then
                echo "SKIP=false" >> $GITHUB_OUTPUT
              else
                echo "SKIP=true" >> $GITHUB_OUTPUT
              fi
            elif [ "$AHEAD_BY" -gt 0 ]; then
              echo "Found $AHEAD_BY new commit(s) since last release."
              echo "SKIP=false" >> $GITHUB_OUTPUT
            else
              echo "No new commits since last release."
              echo "SKIP=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 📞 Trigger nightly build
        if: steps.check_commits.outputs.SKIP == 'false' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "trigger-nightly", "client_payload": {"message": "Daily update from upstream"}}'
