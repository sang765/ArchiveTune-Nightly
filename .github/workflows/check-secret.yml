name: Check Secrets

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    name: Check Bearer Tokens

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CANVAS_BEARER_TOKEN
        run: |
          if [ -z "${{ secrets.CANVAS_BEARER_TOKEN }}" ]; then
            echo "❌ CANVAS_BEARER_TOKEN is NOT configured"
            exit 1
          else
            echo "✅ CANVAS_BEARER_TOKEN is configured"
          fi

      - name: Check TOGETHER_BEARER_TOKEN
        run: |
          if [ -z "${{ secrets.TOGETHER_BEARER_TOKEN }}" ]; then
            echo "❌ TOGETHER_BEARER_TOKEN is NOT configured"
            exit 1
          else
            echo "✅ TOGETHER_BEARER_TOKEN is configured"
          fi

      - name: Summary
        if: success()
        run: |
          echo "✅ All required secrets are configured!"
