# Disable or delete this workflows if you don't need it post notification to Telegram.
name: Upload to Telegram

on:
  workflow_run:
    workflows: ["Update Release Notes", "update-release-notes"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use'
        required: false
        type: string

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
  API_ID: ${{ secrets.TELEGRAM_API_ID }}
  API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
  RELEASE_TAG: ${{ github.event.workflow_run.release_tag || '' }}
  GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    steps:
      - name: 🔎 Checkout
        uses: actions/checkout@v6.0.2

      - name: ⬇️ Get release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            RELEASE_TAG="${{ github.event.workflow_run.release_tag }}"
          fi
          
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon requests

      - name: 📱 Send Telegram notification
        run: |
          python3 scripts/send-telegram-py/main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Summary
        run: |
          echo "## Telegram Notification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Release: ${{ env.RELEASE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Thread: ${{ secrets.TELEGRAM_THREAD_ID }}" >> $GITHUB_STEP_SUMMARY