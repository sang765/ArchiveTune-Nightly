name: Sync README

on:
  workflow_run:
    workflows: ["Nightly Build", "trigger-nightly"]
    types:
      - completed
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: ♿ Set up Kotlin
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 💻 Run sync-readme.kts
        run: kotlin scripts/sync-readme.main.kts

      # Change my repository name in "temp/README.md" can make your document broken, so CREAFULLY
      - name: 👍 Your fork, your documentation
        run: |
          sed -i 's|sang765/ArchiveTune-Nightly|${{ github.repository }}|g' README.md

      # Replace static icon with dynamic logo (light/dark mode support)
      - name: 🎨 Apply dynamic logo
        run: |
          sed -i 's|<img src="https://github.com/koiverse/ArchiveTune/blob/main/fastlane/metadata/android/en-US/images/icon.png" width="160" height="160" alt="ArchiveTune Logo" style="border-radius: 22%">|<picture>\n    <source media="(prefers-color-scheme: dark)" srcset="images/icon-white.png">\n    <source media="(prefers-color-scheme: light)" srcset="images/icon-black.png">\n    <img src="images/icon-black.png" width="160" height="160" alt="ArchiveTune Logo" style="border-radius: 22%">\n  </picture>|g' README.md

      - name: ⌨️ Update GIF counters from latest release
        run: |
          # Fetch latest release version using GitHub API
          RELEASE_JSON=$(curl -s -H "Authorization: token ${{ secrets.PAT_TOKEN || github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          
          # Extract tag name (version)
          VERSION=$(echo "$RELEASE_JSON" | grep '"tag_name"' | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          
          # Extract date digits from version (e.g., N20260305 -> 20260305)
          DATE_DIGITS=$(echo "$VERSION" | sed 's/^N//')
          
          echo "Latest version: $VERSION"
          echo "Date digits: $DATE_DIGITS"
          
          # Generate GIF counter URLs for each digit (single link wrapping all images)
          GIF_IMAGES=""
          for i in $(seq 0 7); do
            DIGIT=${DATE_DIGITS:$i:1}
            GIF_IMAGES="$GIF_IMAGES[![Download](https://rule34.xxx/counter/$DIGIT.gif)"
          done
          
          # Wrap all images in a single link
          GIF_URLS="$GIF_IMAGES](https://github.com/${{ github.repository }}/releases/latest)"
          
          echo "Generated GIF URLs: $GIF_URLS"
          
          # Replace placeholder in README.md with actual GIF counters
          sed -i "s|<!-- GIF_COUNTERS:NNNNNNNN -->|$GIF_URLS|g" README.md
          
          # Also update the URL in the link
          sed -i "s|github.com/sang765/ArchiveTune-Nightly/releases/latest|github.com/${{ github.repository }}/releases/latest|g" README.md

      - name: 🔄 Check for changes and commit
        run: |
          # Check if there are changes to commit
          if git diff --quiet README.md; then
            echo "No changes to README.md - skipping commit"
            exit 0
          fi

          # Ensure git user is configured (required for commits)
          git config --global user.name '${{ github.actor }}' || true
          git config --global user.email '${{ github.actor }}@users.noreply.github.com' || true

          # Stage the README.md file
          git add README.md

          # Commit with descriptive message (include timestamp for uniqueness)
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          git commit -m "ci(docs): Sync README.md from workflow run ${TIMESTAMP}" || {
            echo "Warning: Nothing to commit - file may already be staged";
            exit 0;
          }

          # Pull with rebase and handle potential conflicts
          # Use || true to continue on conflict (allows manual resolution)
          if ! git pull --rebase origin main 2>&1; then
            echo "Warning: Pull rebase encountered conflicts. Aborting rebase and skipping push."
            git rebase --abort || true
            echo "::warning::README.md sync skipped due to merge conflicts. Please resolve manually."
            exit 0
          fi

          # Push changes to remote
          if ! git push; then
            echo "Error: Failed to push changes to remote"
            echo "::warning::README.md sync failed during push. Please push manually."
            exit 1
          fi

          echo "✅ README.md successfully synced and pushed to main branch"
