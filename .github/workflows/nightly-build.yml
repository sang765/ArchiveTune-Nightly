name: Nightly Build

on:
  repository_dispatch:
    types: [trigger-nightly]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-shared:
    name: 🔨 Build KMP Shared Module
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: koiverse/ArchiveTune
          ref: dev

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile KMP shared module
        run: ./gradlew :shared:compileCommonMainKotlinMetadata :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64

  build:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ env.NEW_VERSION }}
      new_version_code: ${{ env.NEW_VERSION_CODE }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      date: ${{ steps.date.outputs.date }}
      time: ${{ steps.time.outputs.time }}
    needs: [build-shared]
    strategy:
      matrix:
        include:
          - device: mobile
            deviceName: Mobile
            abi: arm64
          - device: mobile
            deviceName: Mobile
            abi: armeabi
          - device: mobile
            deviceName: Mobile
            abi: x86
          - device: mobile
            deviceName: Mobile
            abi: x86_64
          - device: mobile
            deviceName: Mobile
            abi: universal
          - device: tv
            deviceName: Tv
            abi: universal

    steps:
      - uses: actions/checkout@v6
        with:
          repository: koiverse/ArchiveTune
          ref: dev

      - name: 📃 Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format="- ([%h](https://github.com/koiverse/ArchiveTune/commit/%H)): **\"%s\"** by **@%an**" --since="1 day ago" --no-merges)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Changelog" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🗓️ Get Date
        id: date
        run: echo "date=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: ⏳ Get Time
        id: time
        run: echo "time=$(date +'%I:%M:%S %p')" >> $GITHUB_OUTPUT

      - name: 🤖 Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: 💉 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ❓️ Resolve variant names
        id: variant
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="${{ matrix.device }}"
          ABI="${{ matrix.abi }}"
          DEVICE_CAP="${{ matrix.deviceName }}"
          ABI_CAP="$(tr '[:lower:]' '[:upper:]' <<< "${ABI:0:1}")${ABI:1}"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "abi=$ABI" >> "$GITHUB_OUTPUT"
          echo "device_cap=$DEVICE_CAP" >> "$GITHUB_OUTPUT"
          echo "abi_cap=$ABI_CAP" >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${DEVICE_CAP}${ABI_CAP}Release" >> "$GITHUB_OUTPUT"
          echo "artifact_name=app-${DEVICE}-${ABI}-nightly" >> "$GITHUB_OUTPUT"
          echo "apk_name=app-${DEVICE}-${ABI}-nightly.apk" >> "$GITHUB_OUTPUT"

      - name: ⌨️ Update version name and code for nightly build
        run: |
          # original values
          ORIGINAL_VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          ORIGINAL_VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | head -n1 | sed 's/.*versionCode = \(.*\)/\1/' | tr -d '[:space:]')

          # new versionName (prefix N + YYYYMMDD)
          NEW_VERSION="N$(date +%Y%m%d)"

          # prefer CI build number; fallback to date if not available
          NEW_VERSION_CODE="${GITHUB_RUN_NUMBER}"
          if [ -z "$NEW_VERSION_CODE" ]; then
            NEW_VERSION_CODE=$(date +%Y%m%d)
          fi

          # apply replacements
          sed -i "s/versionName = \"$ORIGINAL_VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = $ORIGINAL_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts

          echo "Changed version from $ORIGINAL_VERSION ($ORIGINAL_VERSION_CODE) to $NEW_VERSION ($NEW_VERSION_CODE)"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_ENV

      - name: ⌨️ Update app name and package for nightly
        run: |
          sed -i 's/applicationId = "moe.koiverse.archivetune"/applicationId = "moe.koiverse.archivetune.nightly"/' app/build.gradle.kts
          sed -i 's/ArchiveTune Debug/ArchiveTune Nightly Debug/' app/src/debug/res/values/app_name.xml
          sed -i 's/ArchiveTune/ArchiveTune Nightly/' app/src/main/res/values/app_name.xml

      - name: ⌨️ Set default update channel to nightly
        run: sed -i 's/defaultValue = UpdateChannel.STABLE/defaultValue = UpdateChannel.NIGHTLY/' app/src/main/kotlin/moe/koiverse/archivetune/ui/screens/settings/UpdateScreen.kt

      - name: ⌨️ Update about screen to show ABI_NIGHTLY label
        run: |
          sed -i 's/text = BuildConfig.ARCHITECTURE.uppercase(),/text = "${BuildConfig.ARCHITECTURE.uppercase()}_NIGHTLY",/' app/src/main/kotlin/moe/koiverse/archivetune/ui/screens/settings/AboutScreen.kt

      - name: ⌨️ Update update check URLs for fork
        run: |
          sed -i 's|https://api.github.com/repos/koiverse/ArchiveTune/releases|https://api.github.com/repos/${{ github.repository }}/releases|g' app/src/main/kotlin/moe/koiverse/archivetune/utils/Updater.kt
          sed -i 's|https://github.com/koiverse/ArchiveTune/releases|https://github.com/${{ github.repository }}/releases|g' app/src/main/kotlin/moe/koiverse/archivetune/utils/Updater.kt
          sed -i 's/ArchiveTune.apk/ArchiveTune-Nightly.apk/' app/src/main/kotlin/moe/koiverse/archivetune/utils/Updater.kt
          sed -i 's/app-${architecture}-release.apk/app-${architecture}-nightly.apk/' app/src/main/kotlin/moe/koiverse/archivetune/utils/Updater.kt
          sed -i 's|https://api.github.com/repos/koiverse/ArchiveTune/releases?per_page=$perPage|https://api.github.com/repos/${{ github.repository }}/releases?per_page=$perPage|g' app/src/main/kotlin/moe/koiverse/archivetune/utils/Updater.kt

      - name: 🔨 Build Release APK
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "================================="
            echo "🔄 Attempt $attempt of $max_attempts"
            echo "================================="
            if ./gradlew ${{ steps.variant.outputs.gradle_task }}; then
              echo "==============="
              echo "✅ Build succeeded"
              echo "==============="
              exit 0
            else
              echo "================================="
              echo "❌ Build failed with exit code $?"
              echo "================================="
              if [ $attempt -eq $max_attempts ]; then
                echo "================================="
                echo "☹️ All $max_attempts attempts failed"
                echo "================================="
                exit 1
              fi
              echo "========================"
              echo "⏳ Retrying in 5 seconds..."
              sleep 5
              echo "========================"
              attempt=$((attempt + 1))
            fi
          done
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}
          CANVAS_BEARER_TOKEN: ${{ secrets.CANVAS_BEARER_TOKEN }}

      - name: ❓️ Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          DEVICE="${{ steps.variant.outputs.device }}"
          ABI="${{ steps.variant.outputs.abi }}"
          DEVICE_CAP="${{ steps.variant.outputs.device_cap }}"
          ABI_CAP="${{ steps.variant.outputs.abi_cap }}"
          CANDIDATES=(
            "app/build/outputs/apk/${DEVICE}/${ABI}/release"
            "app/build/outputs/apk/${DEVICE}${ABI_CAP}/release"
            "app/build/outputs/apk/${DEVICE_CAP}${ABI_CAP}/release"
            "app/build/outputs/apk/${ABI}/${DEVICE}/release"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              echo "release_dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          FOUND_METADATA="$(
            find app/build/outputs/apk -type f -name "output-metadata.json" \
              \( \
                -path "*/${DEVICE}/${ABI}/release/output-metadata.json" -o \
                -path "*/${DEVICE}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${DEVICE_CAP}${ABI_CAP}/release/output-metadata.json" -o \
                -path "*/${ABI}/${DEVICE}/release/output-metadata.json" \
              \) \
              | head -n 1 || true
          )"
          if [ -n "${FOUND_METADATA:-}" ]; then
            echo "release_dir=$(dirname "$FOUND_METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve APK release output directory for DEVICE=$DEVICE ABI=$ABI"
          find app/build/outputs/apk -maxdepth 8 -type d -print || true
          exit 1

      - name: 🔏 Sign APK
        id: sign_app
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: 📲 Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK=$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)
          mv "$SIGNED_APK" "$RELEASE_DIR/out/${{ steps.variant.outputs.apk_name }}"

      - name: 📤 Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.variant.outputs.artifact_name }}
          path: ${{ steps.release_dir.outputs.release_dir }}/out/${{ steps.variant.outputs.apk_name }}

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: main

      - name: 📥 Download APK in Artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded_artifacts/

      - name: 📦 Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.build.outputs.new_version }}
          name: ${{ needs.build.outputs.new_version }}
          files: |
            downloaded_artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 📞 Trigger update release notes
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "update-release-notes", "client_payload": {"new_version": "${{ needs.build.outputs.new_version }}"}}'

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "Build failed on $(date)"
